name: CI

# Déclenchement sur push ou PR sur main, dev, ou feat/*
on:
  push:
    branches:
      - main
      - dev
      - 'feat/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python et uv
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install uv and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      # 3️⃣ Linting avec Ruff
      - name: Lint code with Ruff
        run: uv run ruff check .

      # 4️⃣ Tests unitaires avec pytest et couverture
      - name: Run tests with pytest
        run: |
          uv run pytest
          uv run coverage xml
          uv run genbadge coverage -i coverage.xml -o coverage.svg

      - name: 📤 Sauvegarde du badge (Artefact)
        # NOUVEAU : On utilise la version de Python dans le nom pour éviter les conflits (ex: coverage-badge-3.12)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge-${{ matrix.python-version }}
          path: coverage.svg
          include-hidden-files: true
          if-no-files-found: error

      # 5️⃣ Audit de sécurité pour détecter les secrets
      - name: Secret scanning
        run: |
          echo "Scanning for hardcoded secrets..."
          grep -r --exclude-dir=.git -n -E '([A-Za-z0-9_]{20,})' .